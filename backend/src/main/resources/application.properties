spring.application.name=api

# ==========================================
# CONFIGURAÇÕES DO BANCO DE DADOS (PostgreSQL)
# ==========================================
# O Spring tentará ler a variável ${DB_URL}. Se não achar, usa o fallback após os dois pontos (:).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/edustream}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# Driver e Dialeto do Hibernate
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Configurações de inicialização do Banco (Cria as tabelas automaticamente em desenvolvimento)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURAÇÕES DE SEGURANÇA (JWT)
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=7200000
